version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URI=jdbc:postgresql://db:5432/${DB_NAME:-db_prueba}
      - DB_USER=${DB_USER:-myuser}
      - DB_PASSWORD=${DB_PASSWORD:-mypassword}
      - DB_DRIVER=org.postgresql.Driver
    networks:
      - backend-network
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: postgres:15
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-db_prueba}
      - POSTGRES_USER=${DB_USER:-myuser}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-mypassword}
    networks:
      - backend-network
    env_file:
      - .env

networks:
  backend-network:
    driver: bridge