version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: evaluacion-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: evaluacion
    ports:
      - "3306:3306"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evaluacion-backend
    ports:
      - "8080:8080"
    environment:
      DB_URI: jdbc:mysql://db:3306/evaluacion?useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: root
      DB_DRIVER: com.mysql.cj.jdbc.Driver
    depends_on:
      db:
        condition: service_healthy
